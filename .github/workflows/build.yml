name: Build unsigned IPA
on:
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Show available schemes
        run: xcodebuild -list -project Tethering.xcodeproj

      - name: Build (no signing)
        run: |
          xcodebuild \
            -project Tethering.xcodeproj \
            -scheme "Tethering" \
            -configuration Release \
            -sdk iphoneos \
            -derivedDataPath build \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            build

      - name: Package into IPA
        run: |
          APP=$(find build/Build/Products/Release-iphoneos -maxdepth 1 -name "*.app" | head -n1)
          mkdir Payload
          cp -R "$APP" Payload/
          zip -r Tethering-unsigned.ipa Payload

      - uses: actions/upload-artifact@v4
        with:
          name: Tethering-unsigned-ipa
          path: Tethering-unsigned.ipa
